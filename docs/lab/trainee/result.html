<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>결과 리포트 · IZ-Get</title>
<link rel="stylesheet" href="../iz-tokens.css">
<style>
  .rhead { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: var(--sp-2); }
  .rhead h2 { font-size: var(--fs-2xl); letter-spacing: -.01em; }
  .rhead .crumb { font-size: var(--fs-xs); color: var(--c-text-3); margin-bottom: 4px; }
  .rmeta { font-size: var(--fs-xs); color: var(--c-text-3); margin-bottom: var(--sp-6); }

  .rcard { background: var(--c-surface); border: 1px solid var(--c-border); border-radius: var(--r-lg); padding: var(--sp-5); margin-bottom: var(--sp-4); }
  .rcard .lbl { display: flex; align-items: center; gap: var(--sp-2); font-size: var(--fs-xs); font-weight: 700; text-transform: uppercase; letter-spacing: .03em; margin-bottom: var(--sp-3); color: var(--c-text-2); }
  .rcard .lbl .dot { width: 8px; height: 8px; border-radius: 50%; }
  .rcard.good .lbl { color: var(--c-success); } .rcard.good .lbl .dot { background: var(--c-success); }
  .rcard.weak .lbl { color: var(--c-warning); } .rcard.weak .lbl .dot { background: var(--c-warning); }
  /* D197: axes whose mapped level was never reached (e.g. an early `defended` at L1 skips
     L2/L3/Reflection entirely) -- distinct from "weak" so an early successful defense
     doesn't visually read as rubric failure. See p03-engine.js's D197 comment. */
  .rcard.untested .lbl { color: var(--c-text-3); } .rcard.untested .lbl .dot { background: var(--c-text-3); }
  .axisblock { margin-bottom: var(--sp-3); }
  .axisblock:last-child { margin-bottom: 0; }
  .rcard .axis { display: inline-block; font-size: 11px; font-weight: 600; background: var(--c-surface-2); border: 1px solid var(--c-border); border-radius: 20px; padding: 2px 10px; margin: 2px 6px 4px 0; color: var(--c-text-2); }
  .axisblock .score { font-size: var(--fs-xs); font-weight: 700; color: var(--c-text-2); }
  .axisblock p { font-size: var(--fs-sm); color: var(--c-text-2); line-height: 1.65; margin-top: 4px; }
  .grade { display: inline-flex; align-items: center; gap: var(--sp-2); background: var(--c-success-soft); color: var(--c-success); border-radius: 20px; padding: 7px 16px; font-weight: 700; font-size: var(--fs-lg); }
  .grade.weak { background: var(--c-warning-soft); color: var(--c-warning); }
  .grade .sub { font-size: var(--fs-xs); font-weight: 500; }
  .privacy { font-size: 11px; color: var(--c-text-3); margin-top: var(--sp-5); }
  .actions { margin-top: var(--sp-6); }
  .actions a { display: inline-block; background: var(--c-primary); color: #fff; border-radius: var(--r-md); padding: 10px 18px; font-weight: 600; font-size: var(--fs-sm); }

  .fallback { max-width: 480px; margin: var(--sp-8) auto; text-align: center; }
  .fallback .cta { display: inline-block; background: var(--c-primary); color: #fff; border-radius: var(--r-md); padding: 10px 20px; font-weight: 600; margin-top: var(--sp-4); }

  /* D198: 문답 원문 보기 -- 기본적으로 닫혀있는 <details> (open 속성 없음). */
  #transcript-card summary { cursor: pointer; list-style: none; }
  #transcript-card summary::-webkit-details-marker { display: none; }
  #transcript-card summary .lbl { margin-bottom: 0; }
  #transcript-card summary .lbl::after { content: "▸"; margin-left: auto; color: var(--c-text-3); font-size: 11px; }
  #transcript-card[open] summary .lbl::after { content: "▾"; }
  #transcript-card .tturn { padding: var(--sp-3) 0; border-top: 1px solid var(--c-border); }
  #transcript-card .tturn:first-child { border-top: none; padding-top: var(--sp-3); }
  #transcript-card .tmeta { font-size: 11px; font-weight: 700; color: var(--c-text-3); margin-bottom: 4px; text-transform: uppercase; letter-spacing: .03em; }
  #transcript-card .tq { font-size: var(--fs-sm); font-weight: 600; color: var(--c-text); white-space: pre-wrap; }
  #transcript-card .tans { font-size: var(--fs-sm); color: var(--c-text-2); white-space: pre-wrap; margin-top: 4px; }
</style>
</head>
<body>
<div id="fallback" class="fallback hidden">
  <h2>결과를 찾을 수 없습니다</h2>
  <p style="color:var(--c-text-2); margin-top:8px;">완료된 검증 세션이 없거나 브라우저 세션이 만료됐습니다.</p>
  <a class="cta" href="submission.html">제출 단계로 돌아가기</a>
</div>

<div id="result-root" class="tapp hidden">
  <div class="ttop">
    <div class="l"><div class="brand"><span class="mk">◆</span>IZ-Get</div></div>
  </div>
  <div class="wrap">
    <div class="rhead">
      <div><div class="crumb" id="crumb">결과 리포트</div><h2>검증 결과</h2></div>
    </div>
    <div class="rmeta" id="rmeta"></div>

    <div class="rcard" id="grade-card">
      <div class="lbl">종합</div>
      <div class="grade" id="grade-badge">-</div>
      <p id="grade-desc" style="margin-top:12px; font-size:var(--fs-sm); color:var(--c-text-2);"></p>
    </div>

    <div class="rcard good hidden" id="good-card">
      <div class="lbl"><span class="dot"></span>강점 (4점 이상)</div>
      <div id="good-axes"></div>
    </div>

    <div class="rcard weak hidden" id="weak-card">
      <div class="lbl"><span class="dot"></span>보완이 필요한 영역 (3점 이하)</div>
      <div id="weak-axes"></div>
    </div>

    <div class="rcard untested hidden" id="untested-card">
      <div class="lbl"><span class="dot"></span>미검증 (해당 레벨까지 도달하지 않음)</div>
      <div id="untested-axes"></div>
    </div>

    <details class="rcard" id="transcript-card">
      <summary><div class="lbl">문답 원문 보기</div></summary>
      <div id="transcript-turns" style="margin-top:var(--sp-3);"></div>
    </details>

    <div class="privacy" id="rubric-note"></div>
    <div class="privacy">🔒 실시간 세션 중에는 이 점수가 표시되지 않았습니다 -- 팀 테스트 목적상 채점 완료 직후에만 공개됩니다.</div>
    <div class="actions"><a href="submission.html">새 코드 제출하기</a></div>
  </div>
</div>

<script src="../session-state.js"></script>
<script>
(function () {
  // D184: numeric scores are shown immediately, unlike Team-IZ's original design (which
  // never exposes raw scores/rubric to the trainee) -- this tool's actual users are
  // teammates verifying the pipeline itself works correctly, not trainees being graded,
  // so immediate score visibility is the real requirement here (explicit user request).
  const GOOD_THRESHOLD = 4;
  const LEVEL_LABEL = { l1: "L1", l2: "L2", l3: "L3", reflection: "Reflection" };
  const VERDICT_LABEL = { surface: "표면", partial: "부분", defended: "방어" };

  // D198: 문답 원문 -- session.html에서 진행된 턴 전체(transcript)를 <details>로 접어서
  // 기본 닫힘 상태로 제공. result.transcript는 p03-engine.js의 run() 반환값에 이미
  // 그대로 들어있고 session-state.js가 필드를 걸러내지 않으므로 그대로 렌더한다.
  function renderTranscript(transcript) {
    const container = document.getElementById("transcript-turns");
    container.innerHTML = "";
    (transcript || []).forEach((t, i) => {
      const turn = document.createElement("div");
      turn.className = "tturn";
      const meta = document.createElement("div");
      meta.className = "tmeta";
      const verdict = t.classification && t.classification.verdict;
      meta.textContent = `${i + 1}턴 · ${LEVEL_LABEL[t.level] || t.level}${verdict ? ` · 판정: ${VERDICT_LABEL[verdict] || verdict}` : ""}`;
      const q = document.createElement("p"); q.className = "tq"; q.textContent = `Q. ${t.question}`;
      const a = document.createElement("p"); a.className = "tans"; a.textContent = `A. ${t.answer}`;
      turn.appendChild(meta); turn.appendChild(q); turn.appendChild(a);
      container.appendChild(turn);
    });
  }

  function axisBlock(axis, grade) {
    const div = document.createElement("div");
    div.className = "axisblock";
    const chip = document.createElement("span"); chip.className = "axis"; chip.textContent = axis;
    const score = document.createElement("span"); score.className = "score";
    // D197: `tested === false` marks axes whose mapped level never ran this session
    // (deterministic placeholder from gradeAnswer(), not an LLM score).
    score.textContent = grade.tested === false ? "미검증" : `${grade.score}점`;
    div.appendChild(chip); div.appendChild(score);
    const p = document.createElement("p"); p.textContent = grade.evidence || "";
    div.appendChild(p);
    return div;
  }

  function render(result) {
    document.getElementById("result-root").classList.remove("hidden");
    document.getElementById("crumb").textContent = result.finding.id || result.finding.file || "검증 결과";

    const metaParts = [];
    if (result.finishedAt) metaParts.push(`생성 ${new Date(result.finishedAt).toLocaleString("ko-KR")}`);
    if (result.model) metaParts.push(`모델 ${result.model}`);
    metaParts.push(`${result.turns}턴`);
    if (result.rubric_overridden) metaParts.push("rubric_overridden");
    document.getElementById("rmeta").textContent = metaParts.join(" · ");

    // D176~D184: result.verdict is the same "defended" | "exhausted_at_cap" value the
    // engine already computes -- reinterpreted as a qualitative badge, not a new grading
    // pass. A binary source only supports an honest 2-way label; a 3rd "미흡" tier isn't
    // fabricated here since there's no data in `verdict` alone to distinguish it from
    // "표면" (see p03-engine.js's run() -- verdict never carries more than these 2 states).
    const gradeBadge = document.getElementById("grade-badge");
    const gradeDesc = document.getElementById("grade-desc");
    if (result.verdict === "defended") {
      gradeBadge.textContent = "소유";
      gradeBadge.classList.remove("weak");
      gradeDesc.textContent = "코드를 스스로 설명·방어할 수 있는 수준으로 판단됩니다 (질문 중 하나 이상에서 'defended' 분류).";
    } else {
      gradeBadge.textContent = "표면";
      gradeBadge.classList.add("weak");
      gradeDesc.textContent = "마지막 질문까지 'defended' 분류에 도달하지 못했습니다 (exhausted_at_cap) -- 아래 축별 점수/근거를 참고하세요.";
    }

    const goodEl = document.getElementById("good-axes");
    const weakEl = document.getElementById("weak-axes");
    const untestedEl = document.getElementById("untested-axes");
    let hasGood = false, hasWeak = false, hasUntested = false;
    // D197: `tested === false` (new placeholder shape) must be checked first -- legacy
    // rows saved before this fix never set `tested`, so `undefined !== false` and they
    // fall through to the existing good/weak logic unchanged (no migration needed).
    Object.entries(result.grades).forEach(([axis, grade]) => {
      if (grade.tested === false) { untestedEl.appendChild(axisBlock(axis, grade)); hasUntested = true; }
      else if (grade.score >= GOOD_THRESHOLD) { goodEl.appendChild(axisBlock(axis, grade)); hasGood = true; }
      else { weakEl.appendChild(axisBlock(axis, grade)); hasWeak = true; }
    });
    document.getElementById("good-card").classList.toggle("hidden", !hasGood);
    document.getElementById("weak-card").classList.toggle("hidden", !hasWeak);
    document.getElementById("untested-card").classList.toggle("hidden", !hasUntested);

    document.getElementById("rubric-note").textContent =
      `5축 루브릭 · FR-04-01${result.rubric_overridden ? " · 이 세션은 오버라이드된 루브릭으로 채점됨" : ""}`;

    renderTranscript(result.transcript);
  }

  document.addEventListener("DOMContentLoaded", () => {
    const result = SessionState.loadInterviewResult();
    if (!result) {
      document.getElementById("fallback").classList.remove("hidden");
      return;
    }
    render(result);
  });
})();
</script>
</body>
</html>
