<title>Depth-of-Why — 통합 운영 현황 &amp; 개입 관리</title>
<!--
  결정 로그 (D1~D6은 1차 버전 · D7~D8은 사용자 제공 레퍼런스 반영 개정)
  D1 시그널 색상=dataviz 고정 status 팔레트 재사용(에이스=good,팀이상=warning,프리라이더=serious,위험=critical)
     WHY 검증된 4단계 팔레트 재사용, 임의 색 생성 금지 / COST 4유형을 단일 심각도 축에 강제정렬 / EXIT 브랜드 팔레트 확정 시 --status-* 4개만 교체
  D2 사이드바 항상 다크 네이비 고정(테마 전환 무관), 본문만 라이트/다크 대응
     WHY 팀 레퍼런스 목업 정체성 유지 / COST 라이트 테마에서도 사이드바는 안 밝아짐 / EXIT --sidebar-bg를 분기 토큰으로 바꾸면 전체 대응
  D3 한글 웹폰트 미임베드, 시스템 고딕 스택 + 숫자만 모노스페이스 분리
     WHY CSP가 외부 폰트 차단, 한글 전체 글리프 data URI는 과함 / COST 커스텀 서체 개성 포기 / EXIT 배포 시 Pretendard @font-face로 교체
  D4 학생 데이터 단일 배열(STUDENTS) 기반 파생 — 산점도/랭킹/시그널패널/개입내역 전부 여기서 파생
     WHY 화면 여러 곳에 같은 숫자가 반복 등장, 소스 분산 시 불일치 위험 / COST 선행 스키마 설계 비용 / EXIT 배열을 API 응답으로 교체, 필드명 유지
  D5 산점도는 색상+마커 도형(다이아몬드/삼각형/원) 동시 사용 — 색맹 단독 의존 금지
  D7 사용자가 제공한 2번째 레퍼런스 이미지를 IA 기준으로 채택 — 3-tab 구조 대신 "통합 운영 현황" 단일 대시보드 + "개입 관리" 전용 워크스페이스로 재구성
     WHY 사용자가 명시적으로 "이거 컨셉 대시보드로 활용" 요청 / COST 기존 시그널 피드+모달 구조 폐기 / EXIT 데이터 배열은 유지되어 레이아웃만 교체 가능
  D8 "AI 자동 실행"이 아니라 "AI 추천 → 매니저 확정"으로 카피 조정(레퍼런스 원문 그대로 옮기지 않음)
     WHY 요구사항정의서 FR-08-02(자동확정 금지, 모든 조치는 매니저 액션) 충돌 방지 / COST 문구 길이 증가 / EXIT 정책 변경 시 카피 한 줄만 수정
  D6(개정) 개입 생성은 모달이 아니라 "개입 관리" 화면의 인라인 3-컬럼(후보→유형→계획) 흐름으로 처리
     WHY 후보 여러 건을 연속 처리하는 매니저 워크플로에 더 적합, 레퍼런스도 전용 화면으로 제시 / COST 화면 전환 한 단계 추가 / EXIT 컬럼2·3을 다이얼로그로 옮기면 모달로 환원 가능
-->
<style>
  :root {
    --page: #f5f7fb; --surface: #ffffff; --surface-2: #eef1f8;
    --border: rgba(16,19,31,0.09); --border-strong: rgba(16,19,31,0.16);
    --ink: #10131f; --ink-secondary: #5b6478; --ink-muted: #8b93a7;
    --accent: #2a78d6; --accent-ink: #ffffff; --accent-soft: #e8f0fc; --accent-strong: #184f95;
    --sidebar-bg: #0d1120; --sidebar-ink: #eef1fb; --sidebar-ink-muted: #8891ab;
    --sidebar-active: #182047; --sidebar-border: rgba(255,255,255,0.08);
    --status-good: #0ca30c; --status-warning: #c98500; --status-serious: #ec835a; --status-critical: #d03b3b;
    --status-good-soft: rgba(12,163,12,0.12); --status-warning-soft: rgba(201,133,0,0.14);
    --status-serious-soft: rgba(236,131,90,0.16); --status-critical-soft: rgba(208,59,59,0.12);
    --shadow-card: 0 1px 2px rgba(16,19,31,0.04), 0 10px 28px -16px rgba(16,19,31,0.18);
    --font-ui: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", "Pretendard Variable", Pretendard, sans-serif;
    --font-mono: ui-monospace, "SF Mono", "Cascadia Mono", "Roboto Mono", Menlo, monospace;
    --radius-card: 12px; --radius-chip: 999px; --radius-control: 8px;
  }
  :root[data-theme="dark"] {
    --page: #0a0c14; --surface: #141726; --surface-2: #1b2033;
    --border: rgba(255,255,255,0.08); --border-strong: rgba(255,255,255,0.16);
    --ink: #eef1fb; --ink-secondary: #aab0c9; --ink-muted: #7b8299;
    --accent: #5b9bea; --accent-ink: #071523; --accent-soft: rgba(91,155,234,0.16); --accent-strong: #bcd8f9;
    --sidebar-active: #1b2550;
  }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --page: #0a0c14; --surface: #141726; --surface-2: #1b2033;
      --border: rgba(255,255,255,0.08); --border-strong: rgba(255,255,255,0.16);
      --ink: #eef1fb; --ink-secondary: #aab0c9; --ink-muted: #7b8299;
      --accent: #5b9bea; --accent-ink: #071523; --accent-soft: rgba(91,155,234,0.16); --accent-strong: #bcd8f9;
      --sidebar-active: #1b2550;
    }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: var(--page); color: var(--ink); font-family: var(--font-ui); -webkit-font-smoothing: antialiased; }
  body { font-size: 14px; line-height: 1.5; }
  h1, h2, h3, p { margin: 0; }
  button, select, input, textarea { font-family: inherit; }
  ::selection { background: var(--accent-soft); }
  .num { font-family: var(--font-mono); font-variant-numeric: tabular-nums; }
  @media (prefers-reduced-motion: reduce) { * { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; } }

  .app { display: grid; grid-template-columns: 240px 1fr; height: 100vh; min-height: 560px; }

  .sidebar { background: var(--sidebar-bg); color: var(--sidebar-ink); display: flex; flex-direction: column; padding: 20px 14px; gap: 18px; overflow-y: auto; }
  .brand { display: flex; align-items: center; gap: 10px; padding: 0 6px; }
  .brand-mark { width: 30px; height: 30px; border-radius: 9px; background: linear-gradient(155deg, var(--accent), #164a92); display: flex; align-items: center; justify-content: center; flex: none; }
  .brand-name { font-weight: 700; font-size: 15px; letter-spacing: -0.01em; color: #fff; }
  .brand-sub { font-size: 11px; color: var(--sidebar-ink-muted); margin-top: 1px; }
  .nav-group { display: flex; flex-direction: column; gap: 2px; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 10px; border-radius: 8px; color: var(--sidebar-ink-muted); background: transparent; border: none; width: 100%; text-align: left; font-size: 13.5px; cursor: pointer; }
  .nav-item svg { flex: none; opacity: 0.85; }
  .nav-item:hover { background: rgba(255,255,255,0.05); color: var(--sidebar-ink); }
  .nav-item:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .nav-item.active { background: var(--sidebar-active); color: #fff; }
  .nav-item.active svg { opacity: 1; }
  .nav-count { margin-left: auto; font-family: var(--font-mono); font-size: 11px; background: rgba(255,255,255,0.1); color: #fff; padding: 1px 7px; border-radius: 999px; }
  .nav-item.is-critical .nav-count { background: var(--status-critical); }
  .sidebar-footer { margin-top: auto; border-top: 1px solid var(--sidebar-border); padding-top: 14px; display: flex; flex-direction: column; gap: 10px; }
  .org-card { padding: 10px; border-radius: 10px; background: rgba(255,255,255,0.04); }
  .org-name { font-size: 13px; font-weight: 600; color: #fff; }
  .org-role { font-size: 11.5px; color: var(--sidebar-ink-muted); margin-top: 2px; }
  .set-pill { display: flex; align-items: center; justify-content: space-between; gap: 8px; font-size: 11.5px; color: var(--sidebar-ink-muted); padding: 0 2px; }
  .set-pill b { color: var(--sidebar-ink); font-weight: 600; }

  .main { display: flex; flex-direction: column; min-width: 0; }
  .topbar { display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 14px 28px; border-bottom: 1px solid var(--border); background: var(--surface); flex: none; flex-wrap: wrap; }
  .topbar-title { display: flex; align-items: baseline; gap: 10px; }
  .topbar-title h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.01em; }
  .fr-tag { font-family: var(--font-mono); font-size: 11px; color: var(--ink-muted); background: var(--surface-2); border: 1px solid var(--border); padding: 2px 7px; border-radius: 6px; }
  .topbar-controls { display: flex; align-items: center; gap: 8px; }
  .topbar-controls select { font-size: 12.5px; padding: 7px 10px; border-radius: var(--radius-control); border: 1px solid var(--border-strong); background: var(--surface); color: var(--ink); }
  .topbar-right { display: flex; align-items: center; gap: 14px; }
  .icon-btn { position: relative; width: 34px; height: 34px; border-radius: 9px; border: 1px solid var(--border); background: var(--surface); color: var(--ink-secondary); display: flex; align-items: center; justify-content: center; cursor: pointer; }
  .icon-btn:hover { background: var(--surface-2); color: var(--ink); }
  .icon-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .icon-btn .dot { position: absolute; top: -3px; right: -3px; width: 9px; height: 9px; border-radius: 50%; background: var(--status-critical); border: 2px solid var(--surface); }
  .avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--accent-soft); color: var(--accent-strong); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 12.5px; }

  .viewport { flex: 1; overflow-y: auto; padding: 22px 28px 60px; }
  .view { display: none; flex-direction: column; gap: 16px; max-width: 1340px; }
  .view.active { display: flex; }

  .section-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
  .section-head h2 { font-size: 14.5px; font-weight: 700; }
  .section-head .desc { font-size: 12px; color: var(--ink-muted); margin-top: 3px; }
  .section-head .more { font-size: 12px; font-weight: 600; color: var(--accent); background: none; border: none; cursor: pointer; }
  .section-head .more:hover { text-decoration: underline; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-card); box-shadow: var(--shadow-card); }
  .card-pad { padding: 16px 18px; }

  .briefing { display: flex; align-items: center; gap: 14px; padding: 14px 18px; border-radius: var(--radius-card); background: var(--status-critical-soft); border: 1px solid rgba(208,59,59,0.28); }
  .briefing svg { flex: none; color: var(--status-critical); }
  .briefing-text { flex: 1; font-size: 13px; }
  .briefing-text b { font-weight: 700; }
  .briefing-time { display: block; font-size: 11.5px; color: var(--ink-muted); margin-top: 2px; }

  .btn { font-size: 12.5px; font-weight: 600; padding: 7px 13px; border-radius: var(--radius-control); border: 1px solid var(--border-strong); background: var(--surface); color: var(--ink); cursor: pointer; white-space: nowrap; }
  .btn:hover { background: var(--surface-2); }
  .btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: var(--accent-ink); }
  .btn-primary:hover { background: var(--accent-strong); border-color: var(--accent-strong); }
  .btn-sm { padding: 5px 10px; font-size: 11.5px; }

  .chip { display: inline-flex; align-items: center; gap: 5px; font-size: 11.5px; font-weight: 600; padding: 3px 9px; border-radius: var(--radius-chip); white-space: nowrap; }
  .chip svg { flex: none; }
  .chip-good { background: var(--status-good-soft); color: var(--status-good); }
  .chip-warning { background: var(--status-warning-soft); color: var(--status-warning); }
  .chip-serious { background: var(--status-serious-soft); color: var(--status-serious); }
  .chip-critical { background: var(--status-critical-soft); color: var(--status-critical); }
  .chip-neutral { background: var(--surface-2); color: var(--ink-secondary); }
  .chip-outline { background: transparent; border: 1px solid var(--border-strong); color: var(--ink-secondary); }

  /* Row 1: 브리핑 4카드 + 도넛 + 지표 */
  .top-row { display: grid; grid-template-columns: 1.7fr 1fr 1fr; gap: 14px; align-items: stretch; }
  .brief-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 4px 18px 16px; }
  .brief-tile { border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; display: flex; flex-direction: column; gap: 4px; }
  .brief-tile-top { display: flex; align-items: center; gap: 8px; }
  .brief-tile-icon { width: 26px; height: 26px; border-radius: 7px; display: flex; align-items: center; justify-content: center; flex: none; }
  .brief-tile-label { font-size: 11.5px; font-weight: 600; color: var(--ink-secondary); }
  .brief-tile-value { font-size: 20px; font-weight: 700; font-family: var(--font-mono); }
  .brief-tile-delta { font-size: 11px; font-family: var(--font-mono); font-weight: 700; }

  .donut-row { display: flex; align-items: center; gap: 16px; padding: 4px 18px 16px; }
  .donut-legend { display: flex; flex-direction: column; gap: 7px; font-size: 12px; flex: 1; min-width: 0; }
  .donut-legend .item { display: flex; align-items: center; gap: 7px; justify-content: space-between; }
  .donut-legend .item .lbl { display: flex; align-items: center; gap: 7px; color: var(--ink-secondary); }
  .donut-legend .dot { width: 8px; height: 8px; border-radius: 50%; flex: none; }
  .donut-legend .val { font-family: var(--font-mono); font-weight: 700; }

  .metric-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 4px 18px 16px; }
  .metric-mini { display: flex; flex-direction: column; gap: 3px; }
  .metric-mini .lbl { font-size: 11px; color: var(--ink-muted); font-weight: 600; }
  .metric-mini .val { font-size: 18px; font-weight: 700; font-family: var(--font-mono); }
  .metric-mini .delta { font-size: 10.5px; font-family: var(--font-mono); font-weight: 700; }

  /* Row 2: 4개 미니 패널 — D9: 미니 패널은 <table> 4컬럼이 아니라 세로 스택 카드로 구성
     WHY 카드 폭이 ~270px뿐이라 이름·배지·근거·버튼 4개를 한 줄에 나란히 두면 어느 한 칸이 반드시
         짓눌려 CJK 텍스트가 한 글자씩 세로로 쪼개지는 렌더링 버그 발생(실측, playwright 스크린샷 2회 확인)
     COST 표 형태보다 행 높이가 길어짐(이름줄+근거줄+액션줄 3줄) — 패널이 세로로 더 길어짐
     EXIT 카드 폭이 충분히 넓어지면 mt-row를 다시 한 줄 flex-row로 되돌릴 수 있음(구조는 재사용 가능) */
  .panel-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .mt-rows { display: flex; flex-direction: column; }
  .mt-row { display: flex; flex-direction: column; gap: 5px; padding: 10px 14px; border-top: 1px solid var(--border); font-size: 11.5px; }
  .mt-rows .mt-row:first-child { border-top: none; }
  .mt-row:hover { background: var(--surface-2); }
  .mt-row-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; flex-wrap: wrap; }
  .mt-who { display: flex; align-items: baseline; gap: 6px; min-width: 0; }
  .mt-name { font-weight: 700; font-size: 12px; white-space: nowrap; }
  .mt-sub { font-size: 10.5px; color: var(--ink-muted); white-space: nowrap; }
  .mt-cause { color: var(--ink-secondary); font-size: 11px; line-height: 1.45; overflow-wrap: break-word; }
  .mt-action-row { display: flex; justify-content: flex-end; }
  .mt-action { font-size: 10.5px; font-weight: 700; color: var(--accent); background: var(--accent-soft); border: none; padding: 3px 8px; border-radius: 6px; cursor: pointer; white-space: nowrap; }
  .mt-action:hover { background: var(--accent); color: var(--accent-ink); }
  .mt-actions { display: flex; gap: 4px; flex-wrap: wrap; justify-content: flex-end; }

  /* AI 개입 추천 */
  .rec-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; padding: 4px 18px 18px; }
  .rec-card { border: 1px solid var(--border); border-radius: 10px; padding: 12px 13px; display: flex; flex-direction: column; gap: 8px; }
  .rec-num { width: 20px; height: 20px; border-radius: 50%; color: #fff; font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; font-family: var(--font-mono); }
  .rec-top { display: flex; align-items: center; gap: 8px; }
  .rec-name { font-weight: 700; font-size: 12.5px; }
  .rec-reason { font-size: 11px; color: var(--ink-secondary); line-height: 1.45; flex: 1; }

  /* 개입 현황 요약 */
  .summary-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; padding: 4px 18px 18px; }
  .summary-tile { text-align: left; }
  .summary-tile .lbl { font-size: 11.5px; color: var(--ink-muted); font-weight: 600; }
  .summary-tile .val { font-size: 22px; font-weight: 700; font-family: var(--font-mono); margin-top: 2px; }

  /* Freerider view (scatter + table) */
  .rule-strip { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; padding: 12px 16px; font-size: 12.5px; color: var(--ink-secondary); }
  .rule-strip b { color: var(--ink); font-weight: 700; }
  .threshold-pill { font-family: var(--font-mono); font-size: 11.5px; padding: 3px 9px; border-radius: 6px; background: var(--surface-2); border: 1px solid var(--border); color: var(--ink); }
  .chart-card { padding: 18px 20px 12px; }
  .chart-legend { display: flex; gap: 16px; flex-wrap: wrap; padding: 0 4px 10px; font-size: 12px; color: var(--ink-secondary); }
  .chart-legend span { display: inline-flex; align-items: center; gap: 6px; }
  .chart-wrap { position: relative; }
  .chart-wrap svg .grid-line { stroke: var(--border); stroke-width: 1; }
  .chart-wrap svg .axis-line { stroke: var(--border-strong); stroke-width: 1; }
  .chart-wrap svg .axis-label { fill: var(--ink-muted); font-size: 10.5px; font-family: var(--font-mono); }
  .chart-wrap svg .zone-label { fill: var(--status-critical); font-size: 11px; font-weight: 700; }
  .point { cursor: pointer; }
  .point:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }
  .tooltip { position: absolute; pointer-events: none; z-index: 5; background: #10131f; color: #f2f4fb; padding: 8px 10px; border-radius: 8px; font-size: 11.5px; line-height: 1.45; box-shadow: 0 24px 60px -20px rgba(8,10,20,0.45); opacity: 0; transform: translate(-50%, calc(-100% - 10px)); transition: opacity 0.1s ease; white-space: nowrap; }
  .tooltip.show { opacity: 1; }
  .tooltip b { font-weight: 700; }
  .tooltip .tt-sub { color: #b7bdd1; }
  .table-scroll { overflow-x: auto; }
  table.full { width: 100%; border-collapse: collapse; font-size: 13px; }
  table.full thead th { text-align: left; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; color: var(--ink-muted); padding: 10px 14px; border-bottom: 1px solid var(--border); white-space: nowrap; }
  table.full tbody td { padding: 11px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  table.full tbody tr:last-child td { border-bottom: none; }
  table.full tbody tr:hover { background: var(--surface-2); }
  table.full td.num, table.full th.num { text-align: right; font-family: var(--font-mono); }
  .rank-name { font-weight: 700; }
  .rank-team { font-size: 11.5px; color: var(--ink-muted); }
  .spark { display: block; }

  function renderDonut(container, segments, opts) {

    var ordered = STUDENTS.slice().sort(function (a, b) {

    });

      parts.push('<g class="point" tabindex="0" role="img" data-id="' + s.id + '" aria-label="' + s.name + ", " + s.team + ", 기여율 " + s.contribution + "%, 이해도 " + s.understanding + '점">' + markerFor(s.freeriderState, cx, cy, r) + '<circle cx="' + cx + '" cy="' + cy + '" r="' + (r + 6) + '" fill="transparent"/></g>');

  function wireScatterTooltips() {
    var svg = document.getElementById("scatter-svg"), wrap = document.getElementById("scatter-wrap"), tooltip = document.getElementById("chart-tooltip");
    svg.querySelectorAll(".point").forEach(function (pt) {
      var s = STUDENTS.filter(function (x) { return x.id === pt.getAttribute("data-id"); })[0];
      function show() {
        var rect = pt.getBoundingClientRect(), wrapRect = wrap.getBoundingClientRect();
        tooltip.innerHTML = "<b>" + s.name + "</b> · " + s.team + "<br/>기여율 <b class=\"num\">" + s.contribution + '%</b> · 이해도 <b class="num">' + s.understanding + "</b><br/><span class=\"tt-sub\">" + (s.detectedWeek ? s.detectedWeek + "주차 최초 감지" : freeriderLabel(s.freeriderState)) + "</span>";
        tooltip.style.left = (rect.left - wrapRect.left + rect.width / 2) + "px";
        tooltip.style.top = (rect.top - wrapRect.top) + "px";
        tooltip.classList.add("show");
      }
      function hide() { tooltip.classList.remove("show"); }
      pt.addEventListener("mouseenter", show); pt.addEventListener("mouseleave", hide);
      pt.addEventListener("focus", show); pt.addEventListener("blur", hide);
      pt.addEventListener("click", function () { if (s.freeriderState === "serious" || s.freeriderState === "critical") DOW.openIntervention("freerider", s.name); });
    });
  }

  function sparkline(trend) {
    var w = 64, h = 22, pad = 3;
    var min = Math.min.apply(null, trend), max = Math.max.apply(null, trend), range = (max - min) || 1;
    var pts = trend.map(function (v, i) { return (pad + (i / (trend.length - 1)) * (w - pad * 2)).toFixed(1) + "," + (h - pad - ((v - min) / range) * (h - pad * 2)).toFixed(1); });
    var last = pts[pts.length - 1].split(","), declining = trend[trend.length - 1] < trend[0], color = declining ? "var(--status-critical)" : "var(--status-good)";
    return '<svg class="spark" width="' + w + '" height="' + h + '" viewBox="0 0 ' + w + " " + h + '"><polyline points="' + pts.join(" ") + '" fill="none" stroke="' + color + '" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><circle cx="' + last[0] + '" cy="' + last[1] + '" r="2.2" fill="' + color + '"/></svg>';

      '<div class="section-head"><div><h2>팀 분석</h2><div class="desc">팀별 이해도 분포·편차, 완성도 대비 설명력 갭 — FR-05-06</div></div></div>' +
      '<div class="card"><div class="table-scroll"><table class="full"><thead><tr><th>팀</th><th>참여도</th><th class="num">평균 이해도</th><th class="num">응시율</th><th>상태</th></tr></thead><tbody>' +
      TEAMS.map(function (t) {
        var anomaly = TEAM_ANOMALY_TOP.filter(function (a) { return a.team === t.name; })[0];
        return "<tr><td class=\"rank-name\">" + t.name + '</td><td><div class="progress-track" style="width:100px;height:6px;border-radius:999px;background:var(--surface-2);overflow:hidden;"><div style="height:100%;background:var(--accent);border-radius:999px;width:' + t.participation + '%"></div></div></td><td class="num">' + t.avgUnderstanding.toFixed(1) + '</td><td class="num">' + t.attendance + '%</td><td>' + (anomaly ? statusChip("warning", { label: "편차 " + anomaly.deviation + "% · Gap " + anomaly.gap + "%" }) : statusChip("good", { label: "안정" })) + "</td></tr>";
      }).join("") + "</tbody></table></div>" +
      (TEAM_ANOMALY_TOP.length ? '<div class="card-pad" style="border-top:1px solid var(--border);"><b>AI 의견</b> — ' + TEAM_ANOMALY_TOP[0].opinion + ' <button class="btn btn-sm btn-primary" type="button" style="margin-left:8px;" onclick="DOW.openIntervention(\'teamAnomaly\', \'' + esc(TEAM_ANOMALY_TOP[0].team) + '\')">팀 조정 생성</button></div>' : "") +
      "</div>";
  }

  function renderPlaceholder(key, title, desc) {
    document.getElementById("view-" + key).innerHTML =
      '<div class="section-head"><div><h2>' + title + '</h2><div class="desc">' + desc + '</div></div></div>' +
      '<div class="card placeholder-card"><svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="4" y="4" width="16" height="16" rx="3"/><path d="M4 9h16M9 9v11"/></svg>' +
      "<h3>다음 스프린트에서 제공됩니다</h3><p>지금은 통합 운영 현황의 요약 패널과 개입 관리 화면에서 관련 정보를 확인할 수 있습니다.</p>" +
      '<button class="btn btn-primary" type="button" onclick="DOW.goView(\'dashboard\')">통합 운영 현황으로 이동</button></div>';
  }

  /* ================= NAV / VIEW SWITCH ================= */
  var VIEW_META = {
    dashboard: { title: "통합 운영 현황", fr: "FR-05-01 · FR-05-02" },
    risk: { title: "위험 교육생", fr: "FR-05-03" },
    freerider: { title: "프리라이더 의심", fr: "FR-05-04" },
    ace: { title: "에이스", fr: "FR-05-05" },
    teamAnalysis: { title: "팀 분석", fr: "FR-05-06" },
    intervention: { title: "개입 관리", fr: "FR-06-01 · FR-06-02 · FR-06-03" },
    reports: { title: "보고서", fr: "FR-07-01 · FR-07-02" },
    settings: { title: "설정", fr: "—" }
  };
  var rendered = {};
  function ensureRendered(key) {
    if (key === "dashboard") { renderDashboard(); return; }
    if (key === "risk") { renderRiskView(); return; }
    if (key === "freerider") { renderFreeriderView(); return; }
    if (key === "ace") { renderAceView(); return; }
    if (key === "teamAnalysis") { renderTeamAnalysisView(); return; }
    if (key === "intervention") {
      renderInterventionView();
      if (window._pendingSelect) { selectCandidate(window._pendingSelect.category, window._pendingSelect.ref); window._pendingSelect = null; }
      return;
    }
    if (!rendered[key]) {
      renderPlaceholder(key, VIEW_META[key].title, "구현 예정 화면입니다.");
      rendered[key] = true;
    }
  }

  window.DOW = {
    goView: function (key) {
      document.querySelectorAll(".view").forEach(function (v) { v.classList.toggle("active", v.id === "view-" + key); });
      document.querySelectorAll("#main-nav .nav-item").forEach(function (b) { b.classList.toggle("active", b.getAttribute("data-view") === key); });
      document.getElementById("view-title").textContent = VIEW_META[key].title;
      document.getElementById("view-fr-tag").textContent = VIEW_META[key].fr;
      document.getElementById("topbar-controls").style.display = key === "dashboard" ? "flex" : "none";
      ensureRendered(key);
    },
    openIntervention: function (category, ref) {
      candTab = category;
      window._pendingSelect = { category: category, ref: ref };
      DOW.goView("intervention");
    },
    wireDashboardActions: function () {},
    renderNavCounts: function () {
      document.getElementById("nav-count-risk").textContent = RISK_TOP.length;
      document.getElementById("nav-count-freerider").textContent = FREERIDER_TOP.length;
      document.getElementById("nav-count-intervention").textContent = INTERVENTIONS.filter(function (i) { return i.status === "대기" || i.status === "진행중"; }).length;
    }
  };

  document.querySelectorAll("#main-nav .nav-item").forEach(function (btn) {
    btn.addEventListener("click", function () { DOW.goView(btn.getAttribute("data-view")); });
  });
  document.getElementById("bell-btn").addEventListener("click", function () { DOW.goView("intervention"); });
  document.getElementById("refresh-btn").addEventListener("click", function () { ensureRendered("dashboard"); });

  renderDashboard();
  DOW.renderNavCounts();
</script>
